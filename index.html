<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>2026 연구비 집행 현황 | KIAPI 전략기획본부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --line:#eceef1;
  --text:#191f28; --text2:#4e5968; --text3:#8b95a1;
  --accent:#5b5fe8; --accent2:#8b5cf6; --accent-bg:#eef0fe;
  --grad:linear-gradient(135deg,#3182f6,#7c5cf6);
  --blue:#3182f6; --blue-bg:#eaf2fe;
  --green:#00a86b; --green-bg:#e5f6ef;
  --amber:#f5a623; --amber-bg:#fef4e2;
  --red:#f04452;  --red-bg:#fdebed;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Pretendard Variable',Pretendard,'Nanum Gothic',-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased}
body::before{content:'';display:block;height:4px;background:var(--grad)}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}

/* ── 헤더 ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:1280px;margin:0 auto;padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:36px;height:36px;border-radius:11px;background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 10px rgba(91,95,232,.3)}
.brand-logo svg{width:19px;height:19px;stroke:#fff;stroke-width:2.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.brand h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.brand .org{font-size:12px;color:var(--text3);font-weight:500}
.asof{font-size:12px;color:var(--text2);background:var(--accent-bg);border:1px solid #dfe2fc;
  padding:6px 12px;border-radius:99px;white-space:nowrap}
.asof strong{color:var(--accent)}

.wrap{max-width:1280px;margin:0 auto;padding:28px 24px 60px}

/* ── KPI ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--kbg,var(--accent-bg));
  border:1px solid color-mix(in srgb,var(--kc,var(--accent)) 16%,#fff);border-radius:var(--radius);
  padding:22px;transition:all .2s;position:relative}
.kpi:hover{box-shadow:0 10px 28px color-mix(in srgb,var(--kc,var(--accent)) 18%,transparent);transform:translateY(-2px)}
.kpi-hd{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.kpi-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:#fff;color:var(--kc,var(--accent));flex-shrink:0;
  box-shadow:0 2px 8px rgba(25,31,40,.08)}
.kpi-ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.kpi .lb{font-size:12.5px;color:color-mix(in srgb,var(--kc,var(--accent)) 55%,var(--text));font-weight:800;letter-spacing:.2px}
.kpi .vl{font-size:28px;font-weight:800;letter-spacing:-.6px;font-variant-numeric:tabular-nums}
.kpi .vl .unit{font-size:14px;font-weight:600;color:var(--text3);margin-left:3px}
.kpi .sb{font-size:12px;color:var(--text2);margin-top:7px}
.kpi .sb b{color:var(--text)}

/* ── 메인 탭 ── */
.vtabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:5px;margin-bottom:18px;width:fit-content;max-width:100%;overflow-x:auto}
.vtab{padding:9px 20px;border-radius:10px;font-size:13.5px;font-weight:700;color:var(--text3);
  white-space:nowrap;transition:all .18s}
.vtab:hover:not(.on){color:var(--text2);background:var(--bg)}
.vtab.on{background:var(--grad);color:#fff;box-shadow:0 3px 10px rgba(91,95,232,.28)}
.view{display:none}.view.on{display:block}
.kpi-prog{margin-top:12px;height:8px;border-radius:99px;background:#fff;overflow:hidden;position:relative}
.kpi-prog>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#3182f6,#5fa2f8)}
.kpi-prog .mark{position:absolute;top:-2px;width:2px;height:12px;background:var(--text3);border-radius:1px}

/* ── 카드 공통 ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;margin-bottom:18px}
.card h2{font-size:16px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px}
.card h2::before{content:'';width:5px;height:16px;border-radius:3px;background:var(--grad);flex-shrink:0}
.unit-tag{margin-left:auto;background:#fff3cd;border:1px solid #f0d98a;color:#8a6500;
  font-size:11.5px;font-weight:800;padding:4px 12px;border-radius:99px;white-space:nowrap;letter-spacing:.2px}
.card .desc{font-size:12.5px;color:var(--text3);margin:4px 0 18px}
.row-2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px}
.row-1-1{display:grid;grid-template-columns:1fr 1fr;gap:18px}

.chart-box{position:relative;width:100%}

/* ── 필터칩 / 정렬 ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;margin-bottom:16px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;
  background:var(--bg);color:var(--text2);border:1px solid var(--line);transition:all .15s}
.chip:hover{border-color:#d2d8de}
.chip.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 8px rgba(91,95,232,.25)}
select.sort{font:inherit;font-size:13px;font-weight:600;color:var(--text2);
  background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:7px 10px;cursor:pointer}

/* ── 과제 카드 그리드 ── */
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;text-align:left;transition:all .18s;display:flex;flex-direction:column;gap:0}
.pcard:hover{box-shadow:0 10px 28px rgba(25,31,40,.09);transform:translateY(-2px);border-color:#d8def0}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.pcard-name{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.35}
.pcard-mgr{font-size:12px;color:var(--text3);margin-top:3px}
.ring{flex-shrink:0;position:relative;width:54px;height:54px}
.ring svg{transform:rotate(-90deg)}
.ring .rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800}
.pcard-nums{display:flex;gap:0;margin-top:auto;padding-top:12px;border-top:1px solid var(--line)}
.pcard-nums>div{flex:1}
.pcard-nums .l{font-size:11px;color:var(--text3)}
.pcard-nums .v{font-size:13.5px;font-weight:700;margin-top:1px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.bdg{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
.bdg.m-산업부{background:var(--blue-bg);color:#1b64da}
.bdg.m-과기부{background:var(--green-bg);color:#00805a}
.bdg.m-국토부{background:var(--amber-bg);color:#b97509}
.bdg.m-경찰청{background:var(--red-bg);color:#d62939}
.bdg.m-기타{background:#f1f3f5;color:var(--text2)}
.bdg.t{background:#f1f3f5;color:var(--text2)}
.nobud{font-size:12px;color:var(--text3);font-style:italic;padding-top:12px;border-top:1px solid var(--line);margin-top:auto}

/* ── 표 ── */
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{font-size:12px;font-weight:800;color:#3d49c4;text-align:left;
  background:#eef0fe;padding:11px 12px;white-space:nowrap;letter-spacing:.2px}
thead tr th:first-child{border-radius:10px 0 0 10px}
thead tr th:last-child{border-radius:0 10px 10px 0}
thead th.r{text-align:right}
tbody td{padding:11px 12px;font-size:13.5px;border-bottom:1px solid var(--line)}
tbody td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover{background:#fafbfc}

/* ── 모달 ── */
.ovl{display:none;position:fixed;inset:0;background:rgba(25,31,40,.45);z-index:200;
  padding:24px 14px;overflow-y:auto}
.ovl.show{display:flex;align-items:flex-start;justify-content:center}
.mdl{background:var(--bg);border-radius:22px;width:100%;max-width:980px;margin:auto;
  overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.mdl-hd{background:var(--card);padding:24px 28px 0;border-bottom:1px solid var(--line)}
.mdl-close{float:right;width:34px;height:34px;border-radius:99px;background:var(--bg);
  font-size:15px;color:var(--text2)}
.mdl-close:hover{background:var(--line)}
.mdl-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.mdl-meta{font-size:12.5px;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.tabs{display:flex;gap:4px}
.tab{padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--text3);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--blue);border-color:var(--blue)}
.tab.xls{margin-left:auto;color:#107c41;text-decoration:none;display:inline-flex;align-items:center}
.tab.xls:hover{background:#e9f5ee;border-radius:8px 8px 0 0}
.mdl-bd{padding:22px 28px;max-height:calc(88vh - 160px);overflow-y:auto}
.tabc{display:none}.tabc.on{display:block}

.sumrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sumbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.sumbox .v{font-size:19px;font-weight:800}
.sumbox .l{font-size:11.5px;color:var(--text3);margin-top:2px}
.itgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.itcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
.itcard .n{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}
.itcard .nums{display:flex;justify-content:space-between;font-size:12px;margin-bottom:7px}
.itcard .bar{height:7px;border-radius:99px;background:var(--bg);overflow:hidden}
.itcard .bar>i{display:block;height:100%;border-radius:99px}
.itcard .rm{font-size:11px;color:var(--text3);text-align:right;margin-top:5px}
.sec-t{font-size:14px;font-weight:700;margin:20px 0 12px;letter-spacing:-.3px}
.drow{display:grid;grid-template-columns:190px 1fr 110px;gap:12px;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:0}
.drow .n{font-size:13px;font-weight:600}
.drow .s{font-size:11.5px;color:var(--text3);margin-top:1px}
.dtrack{height:8px;border-radius:99px;background:var(--bg);overflow:hidden}
.dtrack>i{display:block;height:100%;border-radius:99px}
.dval{font-size:12.5px;font-weight:700;text-align:right}
.dval .p{font-size:11px;color:var(--text3);font-weight:600}
.acc{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--card)}
.acc-h{width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;font-size:13.5px;font-weight:700;text-align:left}
.acc-h:hover{background:var(--bg)}
.acc-h .ar{color:var(--text3);transition:transform .2s}
.acc.open .ar{transform:rotate(180deg)}
.acc-b{display:none;border-top:1px solid var(--line)}
.acc.open .acc-b{display:block}
.doc{display:grid;grid-template-columns:190px 1fr;gap:12px;padding:10px 16px;
  border-bottom:1px solid var(--line);font-size:12.5px}
.doc:last-child{border-bottom:0}
.doc .dn{font-weight:600}
.doc .dd{color:var(--text2)}
.note{margin-top:14px;padding:12px 16px;background:var(--amber-bg);border-radius:12px;
  font-size:12px;color:#8a5a07;line-height:1.6}
.empty{text-align:center;color:var(--text3);font-size:13px;padding:28px 0}

.footer{text-align:center;font-size:12px;color:var(--text3);padding:10px 0 0}

@media(max-width:980px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .row-2,.row-1-1{grid-template-columns:1fr}
  .proj-grid{grid-template-columns:repeat(2,1fr)}
  .itgrid{grid-template-columns:repeat(2,1fr)}
  .sumrow{grid-template-columns:repeat(2,1fr);gap:8px}
}
@media(max-width:620px){
  .wrap{padding:18px 14px 40px}
  .proj-grid{grid-template-columns:1fr}
  .itgrid{grid-template-columns:1fr}
  .drow{grid-template-columns:1fr}
  .doc{grid-template-columns:1fr}
  .kpi .vl{font-size:22px}
  .topbar-in{padding:12px 14px}
}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-in">
  <div class="brand">
    <div class="brand-logo"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m7 14 3.5-3.5 3.5 3.5L19 9"/></svg></div>
    <div>
      <h1>2026 연구비 집행 현황</h1>
      <div class="org">KIAPI 전략기획본부 · 과제 통합 모니터링</div>
    </div>
  </div>
  <div class="asof">데이터 기준 <strong id="asof"></strong></div>
</div></div>

<div class="wrap">

  <div class="kpis" id="kpis"></div>

  <div class="vtabs" id="vtabs">
    <button class="vtab on" data-v="overview">집행 개요</button>
    <button class="vtab" data-v="projects">과제 목록</button>
    <button class="vtab" data-v="rate">직접비 집행률</button>
  </div>

  <div class="view on" id="view-overview">
  <div class="row-2">
    <div class="card">
      <h2>과제별 직접비 집행률</h2>
      <div class="desc" id="rate-desc"></div>
      <div class="chart-box"><canvas id="rateChart"></canvas></div>
    </div>
    <div class="card">
      <h2>부처별 예산 배분</h2>
      <div class="desc">총 연구비 기준</div>
      <div class="chart-box" style="max-width:330px;margin:0 auto"><canvas id="minChart"></canvas></div>
      <div id="min-legend" style="margin-top:14px"></div>
    </div>
  </div>

  <div class="card">
    <h2>비목별 집행 현황<span class="unit-tag">단위: 백만원</span></h2>
    <div class="desc">전체 과제 합산</div>
    <div class="row-1-1" style="align-items:center">
      <div class="chart-box"><canvas id="itemChart"></canvas></div>
      <div style="overflow-x:auto"><table id="item-table">
        <thead><tr><th>비목</th><th class="r">예산</th><th class="r">집행</th><th class="r">잔액</th><th class="r">집행률</th></tr></thead>
        <tbody></tbody>
      </table></div>
    </div>
  </div>
  </div>

  <div class="view" id="view-rate">
  <div class="card">
    <h2>과제별 직접비 집행률 현황<span class="unit-tag">단위: 백만원</span></h2>
    <div class="desc">집행률 높은 순</div>
    <div style="overflow-x:auto"><table id="allow-table">
      <thead><tr><th>과제</th><th class="r">직접비 예산</th><th class="r">집행액</th>
        <th style="width:30%">집행률</th><th class="r">80%까지 필요 집행액</th><th>상태</th></tr></thead>
      <tbody></tbody>
    </table></div>
  </div>
  </div>

  <div class="view" id="view-projects">
  <div class="card">
    <h2>과제 목록<span class="unit-tag">단위: 백만원</span></h2>
    <div class="desc">카드를 클릭하면 상세 집행 내역을 볼 수 있습니다</div>
    <div class="toolbar">
      <div class="chips" id="chips"></div>
      <select class="sort" id="sort">
        <option value="rate">집행률 높은 순</option>
        <option value="rate-asc">집행률 낮은 순</option>
        <option value="budget">예산 큰 순</option>
        <option value="name">이름순</option>
      </select>
    </div>
    <div class="proj-grid" id="grid"></div>
  </div>
  </div>

  <div class="footer">본 대시보드는 과제별 Excel 파일에서 자동 생성됩니다 · 생성일 <span id="gen-date"></span>
    <span style="margin-left:4px">· designed &amp; built by 유정</span></div>
</div>

<div class="ovl" id="ovl">
  <div class="mdl">
    <div class="mdl-hd">
      <button class="mdl-close" id="mdl-close">✕</button>
      <div class="mdl-title" id="m-title"></div>
      <div class="mdl-meta" id="m-meta"></div>
      <div class="tabs">
        <button class="tab on" data-t="1">집행현황</button>
        <button class="tab" data-t="2">상세내역</button>
        <a class="tab xls" id="m-xls" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;margin-right:4px"><path d="M14 3h7v7"/><path d="M21 3 11 13"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>엑셀 원본</a>
      </div>
    </div>
    <div class="mdl-bd">
      <div class="tabc on" id="t1"></div>
      <div class="tabc" id="t2"></div>
    </div>
  </div>

const ITEM_ORDER = ['인건비','연구수당','장비비','재료비','연구활동비','간접비'];
new Chart(document.getElementById('itemChart'), {
  type:'bar',
  data:{ labels: ITEM_ORDER,
    datasets:[
      { label:'예산', data: ITEM_ORDER.map(k=>Math.round(S.items[k].budget/1e6)),
        backgroundColor:'#e3e7ee', borderRadius:6 },
      { label:'집행', data: ITEM_ORDER.map(k=>Math.round(S.items[k].exec/1e6)),
        backgroundColor:'#7c5cf6', borderRadius:6 }]},
  options:{ responsive:true,
    plugins:{ legend:{position:'top',labels:{boxWidth:12,boxHeight:12,borderRadius:3,useBorderRadius:true,font:{size:12}}},
      tooltip:{callbacks:{label:c=>` ${c.dataset.label} ${c.parsed.y.toLocaleString()}백만`}}},
    scales:{ x:{grid:{display:false},ticks:{font:{size:12,weight:600}}},
      y:{grid:{color:'#f1f3f5'},ticks:{callback:v=>v.toLocaleString(),font:{size:11}}}}}
});
document.querySelector('#item-table tbody').innerHTML = ITEM_ORDER.map(k=>{
  const it=S.items[k], r=it.budget?it.exec/it.budget:0;
  return `<tr><td style="font-weight:600">${k}</td>
    <td class="r">${mm(it.budget)}</td><td class="r">${mm(it.exec)}</td>
    <td class="r" style="color:var(--text3)">${mm(it.budget-it.exec)}</td>
    <td class="r" style="color:${rcol(r)}">${pct(r)}</td></tr>`;
}).join('');

/* ── 과제 카드 그리드 ── */
let fMin='전체', fSort='rate';
const MINS = ['전체', ...new Set(Object.values(P).map(p=>p.ministry||'기타'))];
document.getElementById('chips').innerHTML = MINS.map(m=>
  `<button class="chip${m===fMin?' on':''}" data-m="${m}">${m}</button>`).join('');
document.getElementById('chips').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return;
  fMin=b.dataset.m;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.m===fMin));
  renderGrid();
});
document.getElementById('sort').addEventListener('change',e=>{fSort=e.target.value;renderGrid();});

const TOT_C='#3182f6', DIR_C='#7c5cf6';  // 총 집행률=파랑, 직접비 집행률=보라
function ringSvg(rate, color){
  const col=color||rcol(rate);
  const r=23, c=2*Math.PI*r, d=c*Math.min(rate,1);
  return `<div class="ring"><svg width="54" height="54" viewBox="0 0 54 54">
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="#f1f3f5" stroke-width="5"/>
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="${col}" stroke-width="5"
      stroke-dasharray="${d.toFixed(1)} ${c.toFixed(1)}" stroke-linecap="round"/></svg>
    <span class="rv" style="color:${col}">${Math.round(rate*100)}%</span></div>`;
}

function renderGrid(){
  let list = Object.entries(P);
  if(fMin!=='전체') list=list.filter(([,p])=>(p.ministry||'기타')===fMin);
  list.sort((a,b)=>{
    if(fSort==='rate') return b[1].rate_total-a[1].rate_total;
    if(fSort==='rate-asc') return a[1].rate_total-b[1].rate_total;
    if(fSort==='budget') return b[1].budget_total-a[1].budget_total;
    return a[0].localeCompare(b[0],'ko');
  });
  document.getElementById('grid').innerHTML = list.map(([name,p])=>{
    const mCls='m-'+(MIN_COLOR[p.ministry]?p.ministry:'기타');
    const body = p.has_budget ? `
      <div class="pcard-nums">
        <div><div class="l">총 예산</div><div class="v">${mm(p.budget_total)}<span style="font-size:11px;font-weight:500;color:var(--text3)">백만</span></div></div>
        <div><div class="l">집행</div><div class="v">${mm(p.exec_total)}<span style="font-size:11px;font-weight:500;color:var(--text3)">백만</span></div></div>
        <div><div class="l">직접비 집행률</div><div class="v" style="color:${DIR_C}">${pct(p.rate_direct)}</div></div>
      </div>` : `<div class="nobud">예산 미입력</div>`;
    return `<button class="pcard" data-n="${name.replace(/"/g,'&quot;')}">
      <div class="pcard-top">
        <div><div class="pcard-name">${name}</div><div class="pcard-mgr">${p.manager||''}</div></div>
        ${p.has_budget?`<div style="text-align:center">${ringSvg(p.rate_total)}<div style="font-size:10px;color:var(--text3);margin-top:2px">총 집행률</div></div>`:''}
      </div>
      <div class="badges">
        <span class="bdg ${mCls}">${p.ministry||'기타'}</span>
        <span class="bdg t">${p.type||'-'}</span>
        ${p.has_budget&&p.rate_direct>=0.8?'<span class="bdg" style="background:var(--green-bg);color:#00805a">80% ✓</span>':''}
      </div>
      ${body}</button>`;
  }).join('');
}
renderGrid();
document.getElementById('grid').addEventListener('click',e=>{
  const c=e.target.closest('.pcard'); if(c) openModal(c.dataset.n);
});

/* ── 모달 ── */
const ovl=document.getElementById('ovl');
function openModal(name){
  const p=P[name]; if(!p)return;
  document.getElementById('m-title').textContent=name;
  document.getElementById('m-meta').innerHTML=
    `<span class="bdg m-${MIN_COLOR[p.ministry]?p.ministry:'기타'}">${p.ministry||'기타'}</span>
     <span class="bdg t">${p.type||'-'}</span>
     <span>담당 <b>${p.manager||'-'}</b></span>
     <span>${p.host||''}</span><span>${p.period||''}</span>`;

  // Tab1: 집행현황
  const items = p.items.length ? p.items.map(it=>{
    const c=rcol(it.rate), w=Math.min(it.rate*100,100).toFixed(1);
    return `<div class="itcard"><div class="n">${it.name}</div>
      <div class="nums"><span style="color:var(--text3)">예산 ${mm(it.budget)}</span>
        <span style="font-weight:700">집행 ${mm(it.exec)}</span>
        <span style="font-weight:800;color:${c}">${pct(it.rate)}</span></div>
      <div class="bar"><i style="width:${w}%;background:${c}"></i></div>
      <div class="rm">잔액 ${mm(it.budget-it.exec)}백만</div></div>`;
  }).join('') : '<div class="empty">항목별 데이터 없음</div>';
  document.getElementById('t1').innerHTML=`
    <div class="sumrow">
      <div class="sumbox"><div class="v">${mm(p.budget_total)}<span style="font-size:12px;color:var(--text3)"> 백만</span></div><div class="l">총 연구비</div></div>
      <div class="sumbox"><div class="v" style="color:${TOT_C}">${pct(p.rate_total)}</div><div class="l">총 집행률</div></div>
      <div class="sumbox"><div class="v">${mm(p.exec_direct)}<span style="font-size:12px;color:var(--text3)"> 백만</span></div><div class="l">직접비 집행</div></div>
      <div class="sumbox"><div class="v" style="color:${DIR_C}">${pct(p.rate_direct)}</div><div class="l">직접비 집행률</div></div>
    </div>
    <div class="itgrid">${items}</div>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:14px">
      총 집행률(간접비 포함) ${pct(p.rate_total)} · 직접비 잔액 ${mm(p.budget_direct-p.exec_direct)}백만원</div>
    ${p.has_budget?(p.rate_direct>=0.8
      ?'<div style="text-align:center;font-size:12.5px;font-weight:700;color:#00805a;margin-top:8px">✓ 직접비 80% 이상 집행</div>'
      :`<div style="text-align:center;font-size:12.5px;color:#7c5cf6;font-weight:600;margin-top:8px">직접비 80%까지 ${mm(Math.max(0,0.8*p.budget_direct-p.exec_direct))}백만원 추가 집행 필요</div>`):''}`;

  // Tab2: 상세내역
  const sec=(title,rows)=>{
    if(!rows.length) return `<div class="sec-t">${title}</div><div class="empty">집행 내역 없음</div>`;
    return `<div class="sec-t">${title}</div>`+rows.map(r=>{
      const c=rcol(r.rate), w=Math.max(0,Math.min(Math.abs(r.rate)*100,100)).toFixed(1);
      return `<div class="drow">
        <div><div class="n">${r.name}</div><div class="s">예산 ${mm(r.budget)}백만 · 잔액 ${mm(r.budget-r.exec)}백만</div></div>
        <div class="dtrack"><i style="width:${w}%;background:${c}"></i></div>
        <div class="dval" style="color:${c}">집행 ${mm(r.exec)}백만<br><span class="p">${pct(r.rate)}</span></div></div>`;
    }).join('');
  };
  document.getElementById('t2').innerHTML =
    sec('연구재료비 · 장비비', p.detail_mat) + sec('연구활동비 세목별', p.detail_act);

  // 엑셀 원본 링크 (SharePoint)
  const xls=document.getElementById('m-xls');
  if(p.sp_url){xls.href=p.sp_url;xls.style.display='inline-flex';}
  else{xls.style.display='none';}

  switchTab(1);
  ovl.classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){ovl.classList.remove('show');document.body.style.overflow='';}
function switchTab(n){
  document.querySelectorAll('.tab[data-t]').forEach(t=>t.classList.toggle('on',+t.dataset.t===n));
  document.querySelectorAll('.tabc').forEach((c,i)=>c.classList.toggle('on',i+1===n));
}
document.querySelectorAll('.tab[data-t]').forEach(t=>t.addEventListener('click',()=>switchTab(+t.dataset.t)));
document.getElementById('mdl-close').addEventListener('click',closeModal);
ovl.addEventListener('click',e=>{if(e.target===ovl)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
